<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verifacta Refusal Card</title>
  <style>
    body {
      font-family: 'Courier New', monospace;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }
    .card {
      background: #ffffff;
      border: 2px solid #c62828;
      border-radius: 8px;
      padding: 32px;
      max-width: 780px;
      width: 100%;
      box-shadow: 4px 4px 0 #c62828;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 1.3rem;
      color: #1a1a2e;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .subtitle {
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 16px;
    }
    .badge {
      display: inline-block;
      background: #c62828;
      color: #fff;
      font-size: 0.7rem;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 4px;
      margin-bottom: 24px;
    }
    .field { margin-bottom: 20px; }
    .label {
      font-size: 0.7rem;
      font-weight: bold;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .value {
      font-size: 0.95rem;
      color: #1a1a2e;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .hash {
      font-size: 0.78rem;
      color: #2e7d32;
      word-break: break-all;
    }
    .divider {
      border: none;
      border-top: 1px dashed #ccc;
      margin: 24px 0;
    }
    .note {
      font-size: 0.78rem;
      color: #888;
      font-style: italic;
      background: #fff5f5;
      padding: 10px 12px;
      border-left: 3px solid #c62828;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Verifacta</h1>
    <div class="subtitle">DATA 360 Global Challenge · Claim Card Prototype</div>
    <div class="badge">⚠ No verified data</div>

    <div class="note">
      The query could not be answered with verified statistics from the
      World Bank Data360 catalogue. No data tools returned a citable value.
    </div>

    <div class="field">
      <div class="label">Agent Response</div>
      <div class="value">$answer</div>
    </div>

    <hr class="divider" />

    <div class="field">
      <div class="label">Timestamp (UTC)</div>
      <div class="value">$timestamp</div>
    </div>

    <div class="field">
      <div class="label">SHA-256 Integrity Hash</div>
      <div class="value hash">$sha256</div>
    </div>
  </div>
</body>
</html>
